<script>
        // Generate simulated waveform bars
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('waveform-bars');
            const barCount = 45; // Adjust based on screen width ideally, fixed for demo
            const progress = 0.35; // Matches the left-[35%] of playhead
            
            let html = '';
            for(let i = 0; i < barCount; i++) {
                // Generate a pseudo-random wave-like height
                const heightPhase = Math.sin(i * 0.4) * Math.sin(i * 0.1) * 0.5 + 0.5;
                const randomJitter = Math.random() * 0.3;
                const finalHeight = Math.max(15, (heightPhase + randomJitter) * 100); 
                
                const isPlayed = (i / barCount) <= progress;
                const baseClass = isPlayed 
                    ? 'bg-secondary-container opacity-100 shadow-[0_0_8px_rgba(0,244,254,0.3)]' 
                    : 'bg-surface-variant opacity-50';
                
                html += `<div class="flex-1 w-1 rounded-full transition-all duration-300 ${baseClass}" style="height: ${finalHeight}%"></div>`;
            }
            container.innerHTML = html;
        });
    </script>
