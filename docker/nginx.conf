# nginx config for the Sonic Cloud Flutter web bundle.
#
# - Listens on port 8080 (matches Dockerfile EXPOSE and docker-compose port).
# - SPA fallback: any 404 → /index.html so Flutter's client-side routing works.
# - Long-cache hashed assets under /assets/, /icons/, and main.dart.js.
# - Sensible security headers.

server {
    listen       8080;
    listen       [::]:8080;
    server_name  _;

    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Brotli (if nginx-mod-brotli is available in the image)
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/javascript image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options    "nosniff"                              always;
    add_header X-Frame-Options           "DENY"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Long-cache hashed assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location /icons/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
    location ~* /main\.dart\.js$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Manifest + service worker: never cache (so users always get the latest)
    location = /manifest.json {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
    location = /flutter_service_worker.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback: any unknown path → index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
