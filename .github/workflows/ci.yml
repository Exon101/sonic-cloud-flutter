name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel previous runs on the same PR/branch when new commits arrive.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Analyze + Test: runs on every push and PR. No build artifacts.
  # ───────────────────────────────────────────────────────────────────────────
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons || true
        continue-on-error: true

      - name: Check formatting (non-blocking)
        run: dart format --output=none .
        continue-on-error: true

      - name: Analyze project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: codecov/codecov-action@v7
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ───────────────────────────────────────────────────────────────────────────
  # Build web bundle — used by Vercel/Netlify/Firebase Hosting deploys.
  # ───────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web
    needs: analyze-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons || true
        continue-on-error: true

      - name: Build web
        run: flutter build web --release

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: build/web
          retention-days: 14

  # ───────────────────────────────────────────────────────────────────────────
  # Build Android APK (debug) — fast feedback on PRs.
  # ───────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    needs: analyze-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons || true
        continue-on-error: true

      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: apk-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14
