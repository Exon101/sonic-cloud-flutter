name: UI Tests

# Runs integration tests on an Android emulator — verifies the app
# actually launches, buttons work, and screens render correctly.
#
# Triggers:
#   - Every push to main/develop
#   - Every PR to main
#   - Manual dispatch

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs
concurrency:
  group: ui-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-ui-test:
    name: Android UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons || true
        continue-on-error: true

      # Run integration tests on Android emulator
      # Uses reactivecircus/android-emulator-runner which boots an emulator
      # and runs the specified script
      - name: Run integration tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_5
          script: flutter test integration_test --reporter expanded
        continue-on-error: true
        id: ui-tests

      - name: Upload test screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-screenshots
          path: build/
          retention-days: 7

      - name: Check test results
        if: steps.ui-tests.outcome == 'failure'
        run: |
          echo "::warning::UI tests failed — the app may have rendering issues"
          echo "Check the screenshots artifact for visual debugging"
          exit 0  # Don't fail the entire CI — just warn
