name: Release

# Triggered by:
#   - Pushing a tag like `v1.0.0` → builds all platforms and creates a GitHub Release
#   - Manual dispatch via the Actions tab
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: true
        default: '0.0.0'

permissions:
  contents: write   # needed to create GitHub releases
  packages: write   # needed to push to GHCR if used

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Android — signed release APK + AAB
  # ───────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Decode the base64-encoded keystore saved as a GitHub secret.
      - name: Decode keystore
        if: env.SIGNING_KEYSTORE_BASE64 != ''
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

      - name: Create key.properties
        if: env.KEYSTORE_PASSWORD != ''
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          storeFile=keystore.jks
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build release APK
        run: flutter build apk --release

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-release
          path: build/app/outputs/bundle/release/app-release.aab

  # ───────────────────────────────────────────────────────────────────────────
  # Web — release bundle for hosting on Vercel / Netlify / Firebase
  # ───────────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release --web-renderer canvaski

      - name: Tarball web bundle
        run: tar -czf web-release.tar.gz -C build/web .

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-release
          path: web-release.tar.gz

  # ───────────────────────────────────────────────────────────────────────────
  # iOS — unsigned IPA (Codemagic / user can sign with Fastlane match)
  # ───────────────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS (no code-sign)
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install pods
        run: (cd ios && pod install --repo-update) || true

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app

  # ───────────────────────────────────────────────────────────────────────────
  # macOS — release .app bundle
  # ───────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS Release
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Tarball macOS app
        run: tar -czf macos-release.tar.gz -C build/macos/Build/Products/Release "Sonic Cloud.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: macos-release.tar.gz

  # ───────────────────────────────────────────────────────────────────────────
  # Windows — release .exe + bundled DLLs
  # ───────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows Release
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Zip Windows build
        shell: pwsh
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath windows-release.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: windows-release.zip

  # ───────────────────────────────────────────────────────────────────────────
  # Linux — release binary
  # ───────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libblkid-dev liblzma-dev libstdc++-12-dev clang cmake

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Tarball Linux build
        run: tar -czf linux-release.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: linux-release.tar.gz

  # ───────────────────────────────────────────────────────────────────────────
  # Publish — collects all artifacts and creates a GitHub Release
  # ───────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [build-android, build-web, build-ios, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          cp artifacts/android-apk-release/app-release.apk release/sonic-cloud-${{ steps.ver.outputs.version }}-android.apk
          cp artifacts/android-aab-release/app-release.aab release/sonic-cloud-${{ steps.ver.outputs.version }}-android.aab
          cp artifacts/web-release/web-release.tar.gz release/sonic-cloud-${{ steps.ver.outputs.version }}-web.tar.gz
          cp artifacts/ios-build/Runner.app release/sonic-cloud-${{ steps.ver.outputs.version }}-ios.app || true
          cp artifacts/macos-release/macos-release.tar.gz release/sonic-cloud-${{ steps.ver.outputs.version }}-macos.tar.gz
          cp artifacts/windows-release/windows-release.zip release/sonic-cloud-${{ steps.ver.outputs.version }}-windows.zip
          cp artifacts/linux-release/linux-release.tar.gz release/sonic-cloud-${{ steps.ver.outputs.version }}-linux.tar.gz
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: Sonic Cloud v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: release/*
          draft: false
          prerelease: false
