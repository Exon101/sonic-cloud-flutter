# Netlify deployment config for the Sonic Cloud Flutter web app.
#
# Usage:
#   1. Push this file to your repo.
#   2. In Netlify UI: New site from Git → pick this repo.
#   3. Netlify auto-detects the build command from this file.
#
# Manual CLI deploy:
#   npm install -g netlify-cli
#   flutter build web --release --web-renderer canvaski
#   netlify deploy --prod --dir=build/web

[build]
  command = "bash scripts/netlify_build.sh"
  publish = "build/web"

[build.environment]
  # Pin Flutter version (used by the build script via git clone)
  FLUTTER_VERSION = "stable"
  # Netlify's build cache key (bump to invalidate)
  CACHE_VERSION = "1"

# ── Headers ──────────────────────────────────────────────────────────────────
# Long-cache hashed assets (immutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/main.dart.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache the SPA shell
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Security headers applied to all responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# ── Redirects ────────────────────────────────────────────────────────────────
# SPA fallback — any unknown path → index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
