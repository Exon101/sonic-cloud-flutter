name: sonic_cloud
description: A premium glassmorphic music player with cloud integration, built per the Sonic Cloud design system.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Assets are referenced via network URLs in mock data; no local assets required
  # to keep the project self-contained for review.
