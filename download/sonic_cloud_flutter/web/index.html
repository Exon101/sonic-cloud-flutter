<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Sonic Cloud - A premium glassmorphic music player.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Sonic Cloud">
  <meta name="theme-color" content="#131318">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Sonic Cloud</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #131318;
      overflow: hidden;
      overscroll-behavior: none;
    }
    flt-glass-pane, #flt-element, .flutter-view {
      width: 100vw !important;
      height: 100vh !important;
    }
    .loading-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #12122B, #0A0A0F);
      color: #c5c3e5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      z-index: 9999;
    }
    .loading-text {
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="loading-text">Sonic Cloud</div>
  </div>
  <!-- Flutter 3.44+ initialization: flutter_bootstrap.js sets _flutter.buildConfig
       and calls _flutter.loader.load() automatically. Do NOT call it manually. -->
  <script src="flutter.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
