# docker-compose for Sonic Cloud web app.
#
# Usage:
#   docker compose up --build -d      # build and start
#   docker compose logs -f            # tail logs
#   docker compose down               # stop and remove
#
# Once running, open http://localhost:8080

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: sonic-cloud:latest
    container_name: sonic-cloud-web
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 64M

  # Optional: a reverse proxy in front with TLS termination.
